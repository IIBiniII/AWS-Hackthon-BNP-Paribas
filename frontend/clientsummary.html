<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BNP Client Summary - Adjusted</title>
    <link rel="stylesheet" href="styles/style_general.css">
    <link rel="stylesheet" href="styles/style_summary.css">
    <script type="text/javascript" src="js/js-chatbot.js" defer ></script>

    <script src="js/sumary.js" defer></script>
</head>
<body>

    <header>
        <div class="brand">
            <img src="assets/BNPLogo.png" alt="Logo">
            <span>BNP banking advisor assistant</span>
        </div>
        <button type="button"><span>↻</span> Reste</button>
    </header>

    <main>
        <h1>client summary</h1>

        <div class="container">
            <div class="dashboard">
                <section id="profile"><h2>Profile</h2></section>
                <section id="funding"><h2>Funding</h2></section>
                <section id="history"><h2>History</h2></section>
                <section id="current"><h2>Current projects</h2></section>
                <section id="proposed"><h2>Proposed project</h2></section>
                <section id="other"><h2>Other</h2></section>
            </div>

            <aside>
                <div class="top">
                    <h2>Assistant</h2>
                    <img class="avatar" src="assets/personage.png" alt="robot">
                </div>
                <div class="answer">
                    
                </div>
                <div class="bottom">
                    <textarea class="input-area"></textarea>
                    <button>Send</button>
                </div>
            </aside>
        </div>
    </main>

</body>
</html>
